name: Selenium UI Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Run TestNG Selenium Tests (Headless Chrome)
    runs-on: ubuntu-latest

    # dorny/test-reporter requires checks:write to post inline results
    permissions:
      checks: write
      contents: read

    steps:

      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 11 ─────────────────────────────────────────────────────────
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      # ── 3. Chrome ──────────────────────────────────────────────────────────
      - name: Install Google Chrome (stable)
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      # ── 4. Run tests ───────────────────────────────────────────────────────
      # testData.properties sets browser=chrome-headless; BaseTestClass picks
      # it up and applies --headless=new, --no-sandbox, --disable-dev-shm-usage.
      - name: Run TestNG tests via Maven
        run: mvn clean test -B

      # ── 5. Publish Surefire XML results ────────────────────────────────────
      # Pinned to v1.9.1 — floating v1 tag has TypeError bug with TestNG XML
      - name: Publish Test Results
        uses: dorny/test-reporter@v1.9.1
        if: always()
        with:
          name: TestNG Results
          path: "target/surefire-reports/TEST-*.xml"
          reporter: java-junit
          fail-on-error: false

      # ── 6. Upload Surefire Reports ─────────────────────────────────────────
      - name: Upload Surefire Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 14
