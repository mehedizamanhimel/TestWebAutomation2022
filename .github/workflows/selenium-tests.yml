name: Selenium UI Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:        # allows manual trigger from the GitHub UI

jobs:
  test:
    name: Run TestNG Selenium Tests (Headless Chrome)
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 8 ───────────────────────────────────────────────────────────
      # pom.xml targets Java 8 / source 7, so we match that here.
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      # ── 3. Chrome + ChromeDriver ─────────────────────────────────────────────
      # WebDriverManager 3.7.0 auto-downloads the matching chromedriver at
      # runtime, but we still need the Chrome binary on the runner.
      - name: Install Google Chrome (stable)
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      # ── 4. Run tests ─────────────────────────────────────────────────────────
      # testData.properties already sets browser=chrome-headless so no extra
      # env var is needed — the switch-case in BaseTestClass picks it up.
      - name: Run TestNG tests via Maven
        run: mvn clean test -B

      # ── 5. Publish Surefire XML results ──────────────────────────────────────
      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: TestNG Results
          path: target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: false

      # ── 6. Upload Surefire Reports ───────────────────────────────────────────
      - name: Upload Surefire Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 14
